name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing config
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.RELEASE_STORE_FILE_BASE64 || secrets.RELEASE_STORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_STORE_FILE_BASE64" ]; then
            echo "Missing signing secret: RELEASE_STORE_FILE_BASE64 (or fallback RELEASE_STORE_FILE)." >&2
            echo "Expected value: base64-encoded keystore file contents, not a file path." >&2
            exit 1
          fi

          if [ -z "$RELEASE_STORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "Missing one or more signing secrets: RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD." >&2
            exit 1
          fi

          mkdir -p .signing "$HOME/.gradle"

          CLEANED_KEYSTORE_BASE64="$(printf '%s' "$RELEASE_STORE_FILE_BASE64" | tr -d '[:space:]')"

          if ! printf '%s' "$CLEANED_KEYSTORE_BASE64" | base64 --decode > .signing/release.jks 2>/tmp/keystore_decode_error.log; then
            echo "Failed to decode release keystore secret." >&2
            echo "Make sure RELEASE_STORE_FILE_BASE64 (or RELEASE_STORE_FILE) contains raw base64 of the keystore file." >&2
            cat /tmp/keystore_decode_error.log >&2 || true
            exit 1
          fi

          if [ ! -s .signing/release.jks ]; then
            echo "Decoded keystore file is empty. Check the base64 secret content." >&2
            exit 1
          fi

          cat >> "$HOME/.gradle/gradle.properties" <<EOF
          RELEASE_STORE_FILE=.signing/release.jks
          RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          EOF

      - name: Read app version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          VERSION="$(./gradlew -q printVersionName -PAPP_VERSION="$TAG_VERSION")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release APKs
        run: ./gradlew clean prepareReleaseArtifacts -PAPP_VERSION="${{ steps.version.outputs.tag_version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/github-release/Chronos-${{ steps.version.outputs.version }}-v8a.apk
            app/build/outputs/github-release/Chronos-${{ steps.version.outputs.version }}-v7a.apk
            app/build/outputs/github-release/Chronos-${{ steps.version.outputs.version }}-x86_64.apk
